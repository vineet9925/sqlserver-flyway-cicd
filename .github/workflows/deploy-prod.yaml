name: Production Flyway Database Deployment

on:
  workflow_dispatch:

jobs:
  deploy-database:
    name: Validate and Migrate SQL Server
    runs-on: self-hosted
    environment: production

    # =========================================================================
    # 1. THIS IS WHERE THE UPDATE GOES (Right here under the job setup)
    # =========================================================================
    env:
      FLYWAY_URL: "jdbc:sqlserver://awsdatapoc4:1433;databaseName=test;encrypt=true;trustServerCertificate=true;"
      FLYWAY_USER: ${{ secrets.SQL_SERVER_USER }}
      FLYWAY_PASSWORD: ${{ secrets.SQL_SERVER_PASSWORD }}
      FLYWAY_CONFIG_FILES: ./flyway.conf

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Official Flyway CLI
        uses: red-gate/setup-flyway@v3
        with:
          edition: community
          i-agree-to-the-eula: true

      # =========================================================================
      # 2. NOTICE HOW CLEAN THESE STEPS ARE NOW. 
      # You completely delete the old "-configFiles...", "-url..." text.
      # =========================================================================
      

      - name: Execute Pending Migrations
        run: flyway migrate


      # Step 6: Send Success Email via GMAIL
      - name: Send Success Email via Gmail
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
           server_address: smtp.gmail.com # Changed from Outlook to Google's SMTP Server
           server_port: 465               # Port 465 is the standard secure port for Gmail
           username: ${{ secrets.GMAIL_USER }}
           password: ${{ secrets.GMAIL_PASSWORD }}
           subject: "🚀 SUCCESS: Production Database DDL Pipeline Completed"
           to: "nairvineet1991@gmail.com" # Recipients
           from: "GitHub DevOps Automation <${{ secrets.GMAIL_USER }}>"
           secure: true
           priority: normal
           html_body: |
            <h2>Database Deployment Successful</h2>
            <p>The automated midnight pipeline has successfully deployed all pending SQL Server DDL scripts.</p>
            <ul>
             <li><b>Repository:</b> ${{ github.repository }}</li>
             <li><b>Status:</b> All Flyway migrations applied successfully via Gmail integration</li>
             <li><b>Execution Time:</b> 12:00 AM EST</li>
             </ul>
             <p>You can view the detailed execution logs <a href="https://github.com/${{ github.repository }}/actions">here</a>.</p>
