name: Production Flyway Database Deployment

on:
  workflow_dispatch:

jobs:
  deploy-database:
    name: Validate and Migrate SQL Server
    runs-on: self-hosted
    environment: test

    # =========================================================================
    # 1. THIS IS WHERE THE UPDATE GOES (Right here under the job setup)
    # =========================================================================
    env:
      FLYWAY_URL: "jdbc:sqlserver://awsdatapoc4:1433;databaseName=test;encrypt=true;trustServerCertificate=true;"
      FLYWAY_USER: ${{ secrets.SQL_SERVER_USER }}
      FLYWAY_PASSWORD: ${{ secrets.SQL_SERVER_PASSWORD }}
      FLYWAY_CONFIG_FILES: ./flyway.conf

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Official Flyway CLI
        uses: red-gate/setup-flyway@v3
        with:
          edition: community
          i-agree-to-the-eula: true

      # =========================================================================
      # 2. NOTICE HOW CLEAN THESE STEPS ARE NOW. 
      # You completely delete the old "-configFiles...", "-url..." text.
      # =========================================================================
      - name: Execute flyway Migrate
        run: flyway migrate
		
		  
	     # ==========================================
         #  DYNAMIC EMAIL NOTIFICATIONS
         # ==========================================

      - name: Send Email - Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          secure: true
          subject: "Flyway Migration SUCCESS"
          to: nairvineet1991@gmail.com
          from: GitHub Actions Runner
          body: |
            New database migrations were applied successfully to the data center! 
            Please check the GitHub logs for details.
