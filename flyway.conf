# =============================================================================
# FLYWAY PRODUCTION CONFIGURATION FILE
# =============================================================================

# 1. Location of your SQL migration scripts relative to the repository root
flyway.locations=filesystem:./migrations

# 2. Default schema where Flyway will look for tables and build its history table
flyway.schemas=dbo

# 3. Name of the internal tracking table Flyway will create in your SQL Server
flyway.table=flyway_schema_history

# 4. CRITICAL PRODUCTION SAFEGUARD: Disables the "flyway clean" command.
# This guarantees that the pipeline can NEVER accidentally drop or wipe your database.
flyway.cleanDisabled=true

# 5. Automatically initializes the tracking table if your database already has existing tables.
flyway.baselineOnMigrate=true
flyway.baselineVersion=0.0
